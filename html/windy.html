<!DOCTYPE html>
<html lang="">
<head>
    <title>Windy</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://www.viltstigen.se/favicon.png">

    <link rel="stylesheet" href="https://npmcdn.com/leaflet@1.1.0/dist/leaflet.css"/>
    <link rel="stylesheet" href="leaflet-velocity.css"/>
    <link rel="stylesheet" href="windy.css"/>
</head>

<body>
<div id="loading">
    <div class="loading-box">Loading weather data...</div>
</div>

<div id="page">
    <header id="topbar">
        <div id="app-title">Windy</div>
        <div id="timestamp-panel">Loading forecast time...</div>
    </header>

    <main id="content">
        <section id="map-frame">
            <div id="map"></div>
        </section>

        <aside id="side-panel">
            <h2>Weather</h2>

            <div class="panel-section">
                <h3>Pressure Display</h3>
                <select id="pressure-style">
                    <option value="none" selected>None</option>
                    <option value="isobar">Isobars</option>
                    <option value="heatmap">Heatmap</option>
                </select>
            </div>

            <div class="panel-section">
                <h3>Pressure</h3>
                <div id="pressure-legend-container"></div>
            </div>

            <div class="panel-section">
                <h3>Info</h3>
                <div id="weather-info">
                    Wind animation is always enabled. Pressure overlay can be selected above.
                </div>
            </div>
        </aside>
    </main>
</div>

<script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
<script src="https://npmcdn.com/leaflet@1.1.0/dist/leaflet.js"></script>

<script src="leaflet-velocity.js"></script>
<script src="heatmap.js"></script>
<script src="leaflet-heatmap.js"></script>
<script src="windy.js?version=6"></script>
</body>
</html>
